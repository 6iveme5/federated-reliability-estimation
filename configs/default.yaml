experiment:
  name: fedrel_journal_default
  seed: 42

data:
  federated_dir: data/federated
  raw_dir: data/raw
  target_column: outcomeType
  chuc_path: data/chuc/CHUC.txt
  support2_path: data/support2/support2.csv

reliability:
  gmm_components: 8
  embedding_dim: 8
  hash_dim: 128
  hash_seed: 42
  neighbors: 10

federated:
  optimizer: fedavg
  optimizers: [fedavg, fedprox, fedadam]
  rounds: 20
  local_epochs: 5
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  prox_mu: 0.01
  server_learning_rate: 0.01
  server_beta1: 0.9
  server_beta2: 0.99
  server_tau: 0.001

outputs:
  root: outputs
